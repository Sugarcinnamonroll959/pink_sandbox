<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instant Aesthetic Python Sandbox</title>
    <style>
        /* Matches your notebook's clean, soft, airy aesthetic */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #FFFFFF;
            margin: 0;
            padding: 15px;
            color: #4A4A4A;
        }

        .sandbox-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 100%;
        }

        .box-title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #8E7C80;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        /* Soft pastel pink code editor container */
        textarea {
            width: 100%;
            height: 180px;
            background-color: #FFF0F3; /* Ultra-soft blush pink */
            color: #5C4D50;
            font-family: "Courier New", Courier, monospace;
            font-size: 14px;
            padding: 12px;
            border: 1.5px solid #FFCCD5; /* Soft pink border */
            border-radius: 12px; /* Smooth rounded corners */
            box-sizing: border-box;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            border-color: #FFB3C1;
            background-color: #FFE5EC;
        }

        /* Aesthetic Minimalist Run Button */
        button {
            align-self: flex-start;
            background-color: #FFB3C1; /* Accent pink */
            color: #FFFFFF;
            font-size: 13px;
            font-weight: bold;
            padding: 8px 20px;
            border: none;
            border-radius: 20px; /* Pillow-soft round button */
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(255, 179, 193, 0.3);
        }

        button:hover {
            background-color: #FF93AC;
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: #EAEAEA;
            color: #A0A0A0;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Clean minimalist terminal output box */
        #output {
            width: 100%;
            min-height: 80px;
            background-color: #FAFAFA; /* Off-white terminal */
            color: #655658;
            padding: 12px;
            font-family: "Courier New", Courier, monospace;
            font-size: 13px;
            border: 1.5px solid #EAEAEA;
            border-radius: 12px;
            box-sizing: border-box;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="sandbox-container">
        <div>
            <div class="box-title">୨୧ main.py</div>
            <textarea id="code"># Write your Python code here...
print("Hello from your beautiful notebook! ✨")
print("Instant execution check:", 5 * 5)</textarea>
        </div>
        
        <button id="runBtn" onclick="runPython()">⚡ RUN PROGRAM</button>
        
        <div>
            <div class="box-title">✦ Console Output</div>
            <div id="output">Your sandbox is ready! Type some code and hit Run. ✨</div>
        </div>
    </div>

    <script>
        async function runPython() {
            const code = document.getElementById("code").value;
            const outputDiv = document.getElementById("output");
            const runBtn = document.getElementById("runBtn");

            outputDiv.innerText = "Running... ⚡";
            runBtn.disabled = true;

            try {
                // Uses a fast, free, public API to execute Python code instantly in the cloud
                const response = await fetch("https://emkc.org", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        language: "python",
                        version: "3.10.0",
                        files: [{ content: code }]
                    })
                });

                const data = await response.json();
                
                if (data.run) {
                    // Combine standard output and error text if there's a problem
                    let result = data.run.output;
                    outputDiv.innerText = result || "(Code ran perfectly with no output text!)";
                } else {
                    outputDiv.innerText = "⚠️ Execution failed to start.";
                }
            } catch (err) {
                outputDiv.innerText = "⚠️ Connection error:\n" + err;
            } finally {
                runBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
